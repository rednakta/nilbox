name: Bug Report
description: Report a bug or unexpected behavior in nilbox
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the information below to help us diagnose and fix the issue.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which OS are you running nilbox on?
      options:
        - All platforms
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: e.g. macOS 15.2 Sequoia, Ubuntu 24.04, Windows 11 24H2
      placeholder: macOS 15.2 Sequoia
    validations:
      required: true

  - type: input
    id: nilbox_version
    attributes:
      label: nilbox Version
      description: Check `src-tauri/tauri.conf.json` or the About screen
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open nilbox
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant logs from the Tauri console or VM agent output
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, workarounds, or anything else that might help
